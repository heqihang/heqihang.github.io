<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
<div id="toECI"></div>
<div id="text"></div>
<div id="married"></div>
<div id="s07"></div>
<div id="s08"></div>
<div id="s09"></div>
<div id="sy"></div>
<div id="s10"></div>
<div id="s11"></div>
<div id="s12"></div>
<div id="wedding" style="font-size: 20px; color: red; font-weight: bold;"></div>

<script>
  const beginDate = new Date('2021-11-03').getTime()
  const currentTimeMS = new Date().getTime()
  const distance = currentTimeMS - beginDate
  document.getElementById('toECI').innerText = `加入ECI已经${Math.floor(distance / 1000 / 60 / 60 / 24)}天`
  // 放学倒计时
  let timer = null

  function time() {
    const targetDate = new Date(`${new Date().getFullYear()}-${new Date().getMonth() + 1}-${new Date().getDate()} 17:45:00`)
    const oDate = new Date()
    const distance = (targetDate.getTime() - oDate.getTime()) / 1000
    const hours = Math.floor(distance / 60 / 60 % 24)
    const minutes = Math.floor(distance / 60 % 60)
    const seconds = Math.floor(distance % 60)
    if (hours <= 0 && minutes <= 0 && seconds <= 0) {
      timer && clearInterval(timer)
      document.getElementById('text').innerText = '已放学，请不要再卷了！'
    } else {
      timer && clearInterval(timer)
      timer = setInterval(() => {
        time()
      }, 1000)
      document.getElementById('text').innerText = `现在距离放学还有${hours}小时${minutes}分${seconds}秒(${Math.floor(distance)}秒)(17:45:00)`
    }
  }

  time()

  // 日期倒计时
  const currentTime = new Date()
  const currentYear = currentTime.getFullYear()
  const currentMonth = currentTime.getMonth() + 1
  const currentDay = currentTime.getDate()
  const currentDate = new Date(`${currentYear}-${currentMonth}-${currentDay}`)
  const endMarriedDate = new Date('2026-06-26')
  const endS07Date = new Date('2026-07-10')
  const endS08Date = new Date('2026-08-10')
  const endS09Date = new Date('2026-09-10')
  const endSYDate = new Date('2026-10-01')
  const endS10Date = new Date('2026-10-09')
  const endS11Date = new Date('2026-11-10')
  const endS12Date = new Date('2026-12-10')
  const endWeddingDate = new Date('2026-10-03')
  const distanceMarried = endMarriedDate.getTime() - currentDate.getTime()
  const distanceS07 = endS07Date.getTime() - currentDate.getTime()
  const distanceS08 = endS08Date.getTime() - currentDate.getTime()
  const distanceS09 = endS09Date.getTime() - currentDate.getTime()
  const distanceSY = endSYDate.getTime() - currentDate.getTime()
  const distanceS10 = endS10Date.getTime() - currentDate.getTime()
  const distanceS11 = endS11Date.getTime() - currentDate.getTime()
  const distanceS12 = endS12Date.getTime() - currentDate.getTime()
  const distanceWedding = endWeddingDate.getTime() - currentDate.getTime()
  document.getElementById('married').innerText = `今天距离领证还有${Math.floor(distanceMarried / 1000 / 24 / 60 / 60)}天(2026.06.26)`
  document.getElementById('s07').innerText = `今天距离2026年7月份开资还有${Math.floor(distanceS07 / 1000 / 24 / 60 / 60)}天(2026.07.10)`
  document.getElementById('s08').innerText = `今天距离2026年8月份开资还有${Math.floor(distanceS08 / 1000 / 24 / 60 / 60)}天(2026.08.10)`
  document.getElementById('s09').innerText = `今天距离2026年9月份开资还有${Math.floor(distanceS09 / 1000 / 24 / 60 / 60)}天(2026.09.10)`
  document.getElementById('sy').innerText = `今天距离2026年国庆节假期开资还有${Math.floor(distanceSY / 1000 / 24 / 60 / 60)}天(2026.10.01)`
  document.getElementById('s10').innerText = `今天距离2026年10月份开资还有${Math.floor(distanceS10 / 1000 / 24 / 60 / 60)}天(2026.10.09)`
  document.getElementById('s11').innerText = `今天距离2026年11月份开资还有${Math.floor(distanceS11 / 1000 / 24 / 60 / 60)}天(2026.11.10)`
  document.getElementById('s12').innerText = `今天距离2026年12月份开资还有${Math.floor(distanceS12 / 1000 / 24 / 60 / 60)}天(2026.12.10)`
  document.getElementById('wedding').innerText = `今天距离婚礼还有${Math.floor(distanceWedding / 1000 / 24 / 60 / 60)}天(2026.10.03)`
</script>
